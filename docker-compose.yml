services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/src
      - ./packages/shared:/app/packages/shared
    environment:
      NODE_ENV: development
      PORT: 4000
      JWT_SECRET: dev-secret-change-me
      WEB_ORIGIN: http://localhost:3000
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: learnsphere
      REDIS_URL: redis://redis:6379
      ADMIN_EMAIL: admin@learnsphere.dev
      ADMIN_PASSWORD: Admin123!
      DEMO_SEED: "true"
      DEMO_INSTRUCTOR_EMAIL: admin@learnsphere.dev
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/src
      - ./packages/shared:/app/packages/shared
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  mongo_data:
  redis_data:
